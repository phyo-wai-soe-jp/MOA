databases:
  - name: moa-db
    plan: free
    databaseName: moa
    user: moa

services:
  - type: web
    name: mobile-order-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python migrate_menu.py
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: moa-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "false"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
